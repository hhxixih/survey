<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>提交成功</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "PingFang SC", sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      margin: 20px;
      border-radius: 16px;
      padding: 50px 30px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 400px;
    }

    .icon { font-size: 64px; margin-bottom: 20px; }
    .title { font-size: 22px; font-weight: 600; color: #222; margin-bottom: 10px; }
    .desc { font-size: 14px; color: #888; line-height: 1.8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <div class="title">提交成功！</div>
    <div class="desc">感谢您的填写<br>我们将尽快与您联系</div>
  </div>
</body>
</html>
